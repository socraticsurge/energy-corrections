name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you re-run a deploy from the Actions tab without pushing a commit.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build
        run: npm run build
        working-directory: site
        env:
          # A project site is served from /<repo>/, so assets need that prefix.
          # If you move to a custom domain, set this to an empty string.
          BASE_PATH: /${{ github.event.repository.name }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
